<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --mint-bg: #E1EAD1; --sage-accent: #B8D3B6; --emerald: #69B395; --forest-dark: #053329; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--mint-bg); min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: var(--forest-dark); border-bottom: 3px solid var(--emerald); padding: 1rem 0; }
        .nav-logo-box { background: var(--emerald); color: var(--forest-dark); padding: 5px 12px; border-radius: 8px; font-weight: 700; }
        .nav-link { color: var(--mint-bg) !important; font-weight: 600; margin-left: 20px; }
        .container-main { flex: 1; padding: 60px 0; }
        .search-box { background: white; padding: 40px; border-radius: 20px; border: 1px solid var(--sage-accent); }
        .btn-search { background: var(--forest-dark); color: white; border: none; padding: 12px 30px; border-radius: 8px; }
        .footer-divider { height: 6px; background: var(--emerald); width: 100%; }
        footer { background: var(--forest-dark); color: var(--mint-bg); padding: 60px 0 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <span class="nav-logo-box">S</span><span class="ms-2 fw-bold text-white">StudentSystem</span>
            </a>
            <div class="ms-auto">
                <a class="nav-link d-inline" href="index.html">Home</a>
                <a class="nav-link d-inline" href="add.html">Add Student</a>
                <a class="nav-link d-inline" href="list.html">Students</a>
                <a class="nav-link d-inline" href="search.html">Search</a>
            </div>
        </div>
    </nav>

    <div class="container container-main">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-box text-center">
                    <h2 class="mb-4">Search Records</h2>
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Enter Roll Number...">
                        <button class="btn btn-search" onclick="searchStudent()">Search Now</button>
                    </div>
                    <div id="searchResult" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-divider"></div>
    <footer><div class="container text-center"><p class="small mb-0 opacity-75">© 2026 Student Management System. All rights reserved.</p></div></footer>

    <script>
        function searchStudent() {
            const query = document.getElementById('searchInput').value;
            const students = JSON.parse(localStorage.getItem('students')) || [];
            const result = students.find(s => s.rollNo === query);
            const display = document.getElementById('searchResult');
            if(result) {
                display.innerHTML = `<div class="alert alert-success mt-3"><strong>Found!</strong> Name: ${result.name} | Roll: ${result.rollNo} | GPA: ${result.gpa}</div>`;
            } else {
                display.innerHTML = `<div class="alert alert-danger mt-3">No student found.</div>`;
            }
        }
    </script>
</body>
</html>
