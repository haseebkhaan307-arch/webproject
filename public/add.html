<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --mint-bg: #E1EAD1; --sage-accent: #B8D3B6; --emerald: #69B395; --forest-dark: #053329; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--mint-bg); color: var(--forest-dark); min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: var(--forest-dark); border-bottom: 3px solid var(--emerald); padding: 1rem 0; }
        .nav-logo-box { background: var(--emerald); color: var(--forest-dark); padding: 5px 12px; border-radius: 8px; font-weight: 700; }
        .nav-link { color: var(--mint-bg) !important; font-weight: 600; margin-left: 20px; }
        .container-main { flex: 1; padding: 40px 0; }
        .card { border-radius: 15px; border: 1px solid var(--sage-accent); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-custom { background: var(--forest-dark); color: white; border: none; padding: 10px 25px; border-radius: 8px; }
        .btn-custom:hover { background: var(--emerald); color: white; }
        .footer-divider { height: 6px; background: var(--emerald); width: 100%; }
        footer { background: var(--forest-dark); color: var(--mint-bg); padding: 60px 0 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <span class="nav-logo-box">S</span>
                <span class="ms-2 fw-bold text-white">StudentSystem</span>
            </a>
            <div class="ms-auto">
                <a class="nav-link d-inline" href="index.html">Home</a>
                <a class="nav-link d-inline" href="add.html">Add Student</a>
                <a class="nav-link d-inline" href="list.html">Students</a>
                <a class="nav-link d-inline" href="search.html">Search</a>
            </div>
        </div>
    </nav>

    <div class="container container-main">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3 class="mb-4">Register New Student</h3>
                    <form id="studentForm">
                        <div class="mb-3"><label class="form-label">Full Name</label><input type="text" id="name" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Roll Number</label><input type="text" id="rollNo" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">GPA</label><input type="number" step="0.01" id="gpa" class="form-control" required></div>
                        <button type="submit" class="btn-custom w-100">Enroll Student</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-divider"></div>
    <footer><div class="container text-center"><p class="small mb-0 opacity-75">© 2026 Student Management System. All rights reserved.</p></div></footer>

    <script>
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const rollNo = document.getElementById('rollNo').value;
            const gpa = document.getElementById('gpa').value;
            
            let students = JSON.parse(localStorage.getItem('students')) || [];
            students.push({ name, rollNo, gpa });
            localStorage.setItem('students', JSON.stringify(students));
            
            // POP-UP REMOVED: The form just resets now
            this.reset();
        });
    </script>
</body>
</html>
